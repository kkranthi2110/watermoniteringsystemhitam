<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Green background circle -->
  <rect width="400" height="400" rx="40" fill="#4CAF50"/>
  
  <!-- Tree/Brain hybrid icon -->
  <g transform="translate(200, 155)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <!-- Trunk -->
    <path d="M 0 60 L 0 20" stroke-width="4"/>
    <path d="M 0 60 L -12 80" stroke-width="3"/>
    <path d="M 0 60 L 12 80" stroke-width="3"/>
    
    <!-- Main branches -->
    <path d="M 0 20 Q -15 0 -30 -15" stroke-width="3.5"/>
    <path d="M 0 20 Q 15 0 30 -15" stroke-width="3.5"/>
    <path d="M 0 10 Q -25 -10 -45 -25" stroke-width="3"/>
    <path d="M 0 10 Q 25 -10 45 -25" stroke-width="3"/>
    
    <!-- Left brain/canopy curves -->
    <path d="M -30 -15 Q -50 -5 -55 -30 Q -58 -50 -40 -60" stroke-width="3"/>
    <path d="M -45 -25 Q -60 -20 -65 -45 Q -62 -65 -45 -70" stroke-width="2.5"/>
    <path d="M -40 -60 Q -30 -75 -15 -70 Q -5 -65 0 -50" stroke-width="3"/>
    <path d="M -45 -70 Q -35 -85 -20 -80 Q -10 -75 -5 -65" stroke-width="2.5"/>
    
    <!-- Right brain/canopy curves -->
    <path d="M 30 -15 Q 50 -5 55 -30 Q 58 -50 40 -60" stroke-width="3"/>
    <path d="M 45 -25 Q 60 -20 65 -45 Q 62 -65 45 -70" stroke-width="2.5"/>
    <path d="M 40 -60 Q 30 -75 15 -70 Q 5 -65 0 -50" stroke-width="3"/>
    <path d="M 45 -70 Q 35 -85 20 -80 Q 10 -75 5 -65" stroke-width="2.5"/>
    
    <!-- Inner brain wrinkle details -->
    <path d="M -25 -35 Q -15 -45 -5 -35" stroke-width="2"/>
    <path d="M -35 -50 Q -25 -55 -15 -50" stroke-width="2"/>
    <path d="M 25 -35 Q 15 -45 5 -35" stroke-width="2"/>
    <path d="M 35 -50 Q 25 -55 15 -50" stroke-width="2"/>
    <path d="M -10 -55 Q 0 -62 10 -55" stroke-width="2"/>
    
    <!-- Connection paths -->
    <path d="M -20 -20 Q -10 -30 0 -20" stroke-width="2"/>
    <path d="M 20 -20 Q 10 -30 0 -20" stroke-width="2"/>
  </g>
  
  <!-- HITAM Text -->
  <text x="200" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="12" fill="white" text-anchor="middle">HITAM</text>
  
  <!-- Tagline -->
  <text x="200" y="345" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="300" letter-spacing="2" fill="rgba(255,255,255,0.9)" text-anchor="middle">find your path</text>
</svg>